services:
  # Веб-сервис для админки Flask
  - type: web
    name: geobot-admin
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn admin_web:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
    plan: free

  # Фоновый сервис для бота
  - type: worker
    name: geobot-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free